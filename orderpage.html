<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>page 2</title>
  </head>
  <style>
    .container_2 {
      background-color: rgb(243, 211, 169);
      height: 100vh;
      display: grid;
      grid-template-columns: 70% 30%;
      align-items: center;
      margin: auto;
      border-radius: 10px;
      border: 2px solid gray;
    }
    .final_prod {
      height: 100%;
      background-color: rgb(243, 223, 195);
      border-radius: 10px;
    }
    .discription_container {
      height: 100%;
      background-color: rgb(188, 183, 183);
      border-radius: 10px;
      border: 2px solid gray;
    }
    .discrip {
      display: flex;
      font-size: 30px;
      padding: auto;
      justify-content: center;
      font-weight: bold;
      font-style: italic;
      color: white;
    }
    .Add_list {
      width: 80%;
      font-weight: bold;
      font-style: italic;
      font-size: 30px;
      background-color: rgb(249, 98, 34);
      align-items: center;
      padding: 20px;
      display: flex;
      margin: auto;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }
    .Add_list:hover {
      background-color: rgb(247, 157, 67);
    }
  </style>
  <body>
    <div class="container_2">
      <div class="final_prod"></div>
      <div class="discription_container">
        <div class="discription">
          <p class="rating discrip">Rating</p>
          <p class="size discrip">Size</p>
          <p class="quantity discrip">Quantity</p>
        </div>

        <button class="Add_list">Add To Wish List</button>
      </div>
    </div>
  </body>
</html>
