<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Shopping</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
      }

      /* Page layout */
      .container {
        background-color: rgb(241, 221, 194);
        height: 100vh;
        display: grid;
        grid-template-rows: 80px 1fr;
      }

      /* Header */
      .heading {
        background-color:  orange;
        color: white;
        display: grid;
        grid-template-columns: auto auto auto auto auto;

        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 0 20px;
        border-radius: 10px;
      }
      .heading input {
        width: 400px;
      }

      .material-symbols-outlined {
        color: white;
        font-size: 30px;
        cursor: pointer;
      }

      /* Content area */
      .product_container {
        display: grid;
        grid-template-columns: 1fr;
        background-color: rgb(241, 221, 194);
        height: 100%;
      }

      /* Sidebar */
      .menu {
        background-color: rgb(159, 159, 235);
        color: rgb(246, 246, 246);
        padding: 20px;
        color: black;
        padding: 50px;
        font-style: italic;
        font-size: 25px;
        border: 2px solid grey;
        position: static;
        border-radius: 5px;
      }

      /* Products grid */
      .products_container {
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
      }

      .products {
        width: 180px;
        background-color: aqua;
        border-radius: 10px;
        text-align: center;
        padding: 10px;
      }

      .products img {
        width: 100%;
        height: 180px;
        object-fit: contain;
        background-color: #eee;
        border-radius: 10px;
      }
      button {
        background-color: grey;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }
     
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Header -->
      <div class="heading">
        <span class="material-symbols-outlined" onclick="menuinsert()"
          >menu</span
        >
        <span class="material-symbols-outlined">search</span>
        <input type="text" placeholder="Search products..." />
        <span class="material-symbols-outlined">shopping_cart</span>
        <span class="material-symbols-outlined">account_box</span>
      </div>

      <!-- Content -->
      <div class="product_container">
        <!-- <div class="menu">Menu</div> -->

        <div class="products_container" id="products_container">
          <!-- Products injected by JS -->
        </div>
      </div>
    </div>

    <script src="web_logic.js"></script>
  </body>
</html>
